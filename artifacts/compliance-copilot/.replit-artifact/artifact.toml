kind = "data-app"
previewPath = "/"
title = "AI Compliance Readiness Copilot"
version = "1.0.0"
id = "artifacts/compliance-copilot"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20976

[services.development]
run = "pnpm --filter @workspace/compliance-copilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/compliance-copilot", "run", "build" ]
publicDir = "artifacts/compliance-copilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20976"
BASE_PATH = "/"
